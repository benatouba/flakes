general {
  border_size = 1
  col.active_border = $flamingo $rosewater 45deg
  col.inactive_border = rgba(595959aa)
  col.nogroup_border = $surface0 $surface1 45deg
  col.nogroup_border_active = $green $yellow 45deg
  gaps_in = 2
  gaps_out = 3
  layout = dwindle
  resize_on_border = true
}

decoration {
  rounding = 4
  blur {
    enabled = true
    size = 5
    passes = 1
  }
  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0
  dim_inactive = false
}

animations {
  enabled = true

  bezier = overshot, 0.13, 0.99, 0.29, 1.1
  animation = windows, 1, 4, overshot, slide
  animation = windowsOut, 1, 5, default, popin 80%
  animation = border, 1, 5, default
  animation = fade, 1, 8, default
  animation = workspaces, 1, 6, overshot, slidevert
}

group {
  insert_after_current = true
  focus_removed_window = true
  col.border_active = $rosewater
  col.border_inactive = $subtext0
  col.border_locked_active = $rosewater
  col.border_locked_inactive = $subtext0
}

dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
  new_on_top = true
  new_on_active = before
  mfact = 0.8
}

misc {
  close_special_on_empty = true
  disable_autoreload = true
  animate_manual_resizes = false
  focus_on_activate = true
  disable_hyprland_logo = true
}

