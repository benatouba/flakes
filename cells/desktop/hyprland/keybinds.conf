$mainMod = SUPER_L
$browser = brave
$terminal = wezterm connect unix
$editor = nvim
$explorer = yazi
$scriptsDir = $HOME/.config/hypr/scripts

# General
bind = $mainMod, d, exec, pkill rofi || rofi -show combi
bind = ALT_L, Tab, exec, pkill rofi || rofi -show window
bind = CTRL ALT, t, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, Space, togglefloating,
bind = $mainMod CTRL, Space, togglegroup
bind = $mainMod, n, changegroupactive, f
bind = $mainMod, F, fullscreen
bind = $mainMod, Y, pin
bind = $mainMod, p, pseudo,
bind = $mainMod, t, layoutmsg, togglesplit
bind = $mainMod SHIFT, R, exec, hyprctl reload && bash $scriptsDir/refresh.sh

# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window
bind = $mainMod SHIFT, H, movewindoworgroup, l
bind = $mainMod SHIFT, L, movewindoworgroup, r
bind = $mainMod SHIFT, K, movewindoworgroup, u
bind = $mainMod SHIFT, J, movewindoworgroup, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Named workspaces
bind = $mainMod, w, workspace, name:web
bind = $mainMod, e, workspace, name:email
bind = $mainMod, m, workspace, name:music
bind = $mainMod, Return, workspace, name:terminal

# Cycle workspaces
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Special workspace (scratchpad)
bind = $mainMod, C, togglespecialworkspace
bind = $mainMod, minus, movetoworkspace, special
bind = $mainMod, equal, togglespecialworkspace

binds {
    workspace_back_and_forth = 1
    allow_workspace_cycles = 1
}

# Move to workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, left, movetoworkspace, -1
bind = $mainMod SHIFT, right, movetoworkspace, +1
bind = $mainMod SHIFT, w, movetoworkspace, name:web
bind = $mainMod SHIFT, e, movetoworkspace, name:email
bind = $mainMod SHIFT, m, movetoworkspace, name:music
bind = $mainMod SHIFT, Return, movetoworkspace, name:terminal
bind = $mainMod SHIFT, C, movetoworkspace, special

# Move active window silently with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, movetoworkspacesilent, 10
bind = $mainMod CTRL, left, movetoworkspacesilent, -1
bind = $mainMod CTRL, right, movetoworkspacesilent, +1
bind = $mainMod CTRL, w, movetoworkspacesilent, name:web
bind = $mainMod CTRL, e, movetoworkspacesilent, name:email
bind = $mainMod CTRL, m, movetoworkspacesilent, name:music
bind = $mainMod CTRL, Return, movetoworkspacesilent, name:terminal

# Move workspace to monitor
bind = ALT SHIFT, 1, movecurrentworkspacetomonitor, 0
bind = ALT SHIFT, 2, movecurrentworkspacetomonitor, 1
bind = ALT SHIFT, 3, movecurrentworkspacetomonitor, 2
bind = ALT SHIFT, m, movecurrentworkspacetomonitor, +1

# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 15 0
binde = , left, resizeactive, -15 0
binde = , up, resizeactive, 0 -15
binde = , down, resizeactive, 0 15
binde = , l, resizeactive, 15 0
binde = , h, resizeactive, -15 0
binde = , k, resizeactive, 0 -15
binde = , j, resizeactive, 0 15
bind = , escape, submap, reset
bind = $mainMod, R, submap, reset
submap = reset

# Resize without submap
bind = CTRL SHIFT, left, resizeactive, -15 0
bind = CTRL SHIFT, right, resizeactive, 15 0
bind = CTRL SHIFT, up, resizeactive, 0 -15
bind = CTRL SHIFT, down, resizeactive, 0 15

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume and brightness
bind = , XF86AudioRaiseVolume, exec, pamixer --allow-boost -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86MonBrightnessUp, exec, brightnessctl -c backlight set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl -c backlight set 5%-

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Screenshots
bind = , Print, exec, hyprshot -m region
bind = CTRL, Print, exec, hyprshot -zm region
bind = SHIFT, Print, exec, hyprshot -m display

# Gaps toggle
bind = $mainMod SHIFT, G, exec, hyprctl --batch "keyword general:gaps_out 5;keyword general:gaps_in 3"
bind = $mainMod, G, exec, hyprctl --batch "keyword general:gaps_out 0;keyword general:gaps_in 0"

# Keyboard layout switch
bind = $mainMod, backslash, exec, hyprctl switchxkblayout cherry-usb-keyboard next

# Random wallpaper
bind = ALT_L, W, exec, bash $scriptsDir/random-wallpaper.sh

# Toggle battery charging
bind = ALT_L SHIFT, C, exec, bash $scriptsDir/toggle-charge.sh

# Waybar toggle
bind = $mainMod, O, exec, waybar-toggle

# Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme cliphist_theme.rasi | cliphist decode | wl-copy
bind = $mainMod SHIFT, B, exec, rofi-rbw -a copy -t password --clear-after 20
bind = $mainMod, B, exec, rofi-rbw --no-help --clear-after 20 --selector-args="-theme-str 'window { width: 800px;}'"
