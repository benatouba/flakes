# ######## Layer rules ########

layerrule {
    name = noanim-layers
    match:namespace = ^(walker|selection|overview|anyrun|indicator.*|osk|hyprpicker|noanim)$
    no_anim = true
}

layerrule {
    name = blur-shell
    match:namespace = ^shell:.*$
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-gtk-layer-shell
    match:namespace = gtk-layer-shell
    blur = true
    ignore_alpha = 0
}

layerrule {
    name = blur-launcher
    match:namespace = launcher
    blur = true
    ignore_alpha = 0.5
}

layerrule {
    name = blur-notifications
    match:namespace = notifications
    blur = true
    ignore_alpha = 0.69
}

layerrule {
    name = blur-session
    match:namespace = session
    blur = true
}

layerrule {
    name = blur-bar
    match:namespace = bar
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-corner
    match:namespace = ^corner.*$
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-dock
    match:namespace = dock
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-indicator
    match:namespace = ^indicator.*$
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-overview
    match:namespace = overview
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-cheatsheet
    match:namespace = cheatsheet
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-sideright
    match:namespace = sideright
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-sideleft
    match:namespace = sideleft
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-osk
    match:namespace = osk
    blur = true
    ignore_alpha = 0.6
}

layerrule {
    name = blur-rofi
    match:namespace = rofi
    blur = true
}

# ######## Window rules ########

# Application tiling
windowrule {
    name = tile-apps
    match:class = ^(wps|dev\.warp\.Warp|org\.wezfurlong\.wezterm)$
    tile = true
}

# Dialogs
windowrule {
    name = float-dialogs
    match:title = ^(Open File|Select a File|Choose wallpaper|Open Folder|Save As|Library)(.*)$
    float = true
}

# General float rules
windowrule {
    name = float-general
    match:title = ^(file_progress|confirm|dialog|download|notification|error|splash|confirmreset|Open File|branchdialog)$
    float = true
}

windowrule {
    name = float-confirm-replace
    match:title = ^(Confirm to replace files)
    float = true
}

windowrule {
    name = float-file-progress
    match:title = ^(File Operation Progress)
    float = true
}

windowrule {
    name = float-lxappearance
    match:class = ^(Lxappearance)$
    float = true
}

windowrule {
    name = float-rofi
    match:class = ^(Rofi)$
    float = true
    no_anim = true
}

windowrule {
    name = stayfocused-rofi
    match:class = ^(rofi)$
    stay_focused = true
}

windowrule {
    name = float-viewers
    match:class = ^(viewnior|Viewnior|feh)$
    float = true
}

windowrule {
    name = float-audio
    match:class = ^(pavucontrol-qt|pavucontrol)$
    float = true
}

windowrule {
    name = float-file-roller
    match:class = ^(file-roller)$
    float = true
}

windowrule {
    name = float-flameshot
    match:title = ^(flameshot)
    float = true
}

windowrule {
    name = float-devtools
    match:title = ^(DevTools)$
    float = true
}

windowrule {
    name = float-kitty
    match:class = ^(kitty)$
    float = true
}

windowrule {
    name = float-qgis
    match:class = ^(qgis|Legend)$
    float = true
}

# wlogout
windowrule {
    name = wlogout
    match:title = wlogout
    fullscreen = true
    float = true
}

# Volume Control
windowrule {
    name = volume-control
    match:title = ^(Volume Control)$
    float = true
    size = 800 600
    move = 75 44%
}

# Polkit
windowrule {
    name = polkit
    match:class = ^(org.kde.polkit-kde-authentication-agent-1)$
    float = true
}

# Media
windowrule {
    name = mpv-idle-inhibit
    match:class = ^(mpv)$
    idle_inhibit = focus
}

windowrule {
    name = firefox-idle-inhibit
    match:class = ^(firefox)$
    idle_inhibit = fullscreen
    no_blur = true
}

windowrule {
    name = float-media-viewer
    match:title = ^(Media viewer)$
    float = true
}

windowrule {
    name = pip
    match:title = ^(Picture-in-Picture)$
    float = true
    size = 960 540
    center = true
}

# imv float
windowrule {
    name = float-imv
    match:class = ^(imv)$
    float = true
    center = true
    size = 960 540
}

# mpv float
windowrule {
    name = float-mpv
    match:class = ^(mpv)$
    float = true
    center = true
    size = 960 540
}

# Brave
windowrule {
    name = tile-brave
    match:initial_class = ^(brave-browser)$
    tile = true
    move = 100%-w-20 100
}

windowrule {
    name = tile-brave-title
    match:title = ^(.*- Brave)$
    tile = true
}

windowrule {
    name = float-bitwarden
    match:title = ^(Bitwarden)$
    float = true
}

# Thunderbird notifications
windowrule {
    name = float-thunderbird
    match:initial_class = thunderbird
    float = true
    move = 100%-w-20 100
}

windowrule {
    name = tile-thunderbird-main
    match:initial_title = Mozilla Thunderbird
    tile = true
}

# Thunderbird compose
windowrule {
    name = thunderbird-compose
    match:initial_title = ^(Write)
    float = true
    move = 25% 50
    size = 50% 95%
    opaque = true
}

windowrule {
    name = opaque-stash
    match:title = Create or import a stash
    opaque = true
}

# Zoom
windowrule {
    name = zoom-opaque-audio
    match:initial_title = ^(Choose one of the audio conference options)$
    opaque = true
}

windowrule {
    name = zoom-meeting-opaque
    match:title = ^(Zoom Meeting)$
    opaque = true
}

windowrule {
    name = zoom-meeting-float
    match:class = ^(Zoom Meeting)$
    float = true
}

windowrule {
    name = zoom-meeting-title-opaque
    match:title = ^(Meeting)$
    opaque = true
}

windowrule {
    name = zoom-menu-window
    match:title = ^(menu window)$
    float = true
}

windowrule {
    name = zoom-class-opaque
    match:class = ^(zoom)$
    opaque = true
    float = true
    move = 3 53
}

windowrule {
    name = zoom-workplace-float
    match:class = (Zoom Workplace)
    float = true
}

windowrule {
    name = zoom-workplace-meeting
    match:title = ^(Meeting)$
    match:class = (Zoom Workplace)
    tile = true
}

windowrule {
    name = zoom-workplace-settings
    match:title = ^(Setting)$
    match:class = (Zoom Workplace)
    float = true
}

windowrule {
    name = zoom-bottombar
    match:initial_title = (.*bottombar.*)
    float = true
    max_size = 300 200
    stay_focused = true
}

windowrule {
    name = zoom-workplace-menu
    match:title = ^(.*)menu(.*)
    match:class = (Zoom Workplace)
    float = true
    stay_focused = true
    min_size = 400 100
}

windowrule {
    name = zoom-tile
    match:class = ^(zoom|Zoom)(.*)$
    tile = true
}

# Opacity overrides
windowrule {
    name = opacity-thunar
    match:class = ^(thunar)$
    opacity = 0.85
}

windowrule {
    name = opacity-gedit
    match:class = ^(gedit)$
    opacity = 0.85
}

windowrule {
    name = opacity-catfish
    match:class = ^(catfish)$
    opacity = 0.85
}

windowrule {
    name = opacity-telegram
    match:title = Telegram
    opacity = 0.95
}

windowrule {
    name = opacity-qq
    match:title = QQ
    opacity = 0.95
}

windowrule {
    name = opacity-netease
    match:title = NetEase Cloud Music Gtk4
    opacity = 0.95
}

# Chat / music workspace assignment
windowrule {
    name = ws-qq
    match:title = Icalingua++
    workspace = name:QQ
}

windowrule {
    name = ws-telegram
    match:title = Telegram
    workspace = name:TG
}

windowrule {
    name = ws-netease
    match:title = NetEase Cloud Music Gtk4
    workspace = name:Music
}

windowrule {
    name = ws-musicfox
    match:class = ^(musicfox)$
    workspace = name:Music
}

# Floating terminals / media
windowrule {
    name = danmufloat
    match:title = danmufloat
    float = true
    center = true
    pin = true
    rounding = 5
    size = 960 540
}

windowrule {
    name = termfloat
    match:title = termfloat
    float = true
    center = true
    size = 960 540
    rounding = 5
}

windowrule {
    name = float-nemo
    match:class = ^(nemo)$
    float = true
    center = true
    size = 960 540
}

windowrule {
    name = float-ncmpcpp
    match:class = ^(ncmpcpp)$
    float = true
    center = true
    size = 960 540
}

# Animation overrides
windowrule {
    name = anim-kitty
    match:title = kitty
    animation = slide right
}
