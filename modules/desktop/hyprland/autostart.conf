# Environment
env = QT_QPA_PLATFORMTHEME, kvantum
env = ELECTRON_OZONE_PLATFORM_HINT, wayland

# Session setup
exec-once = ~/.config/hypr/scripts/resetXdgPortal.sh
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user restart pipewire

# Bar and tray
exec-once = launch-waybar
exec-once = nm-applet

# Notification daemon
exec-once = swaync

# Wallpaper
exec-once = hyprpaper
exec-once = sleep 1 && bash ~/.config/hypr/scripts/random-wallpaper.sh

# XSettings daemon (for GTK/X11 app theming)
exec-once = xsettingsd

# Night light
exec-once = wlsunset -t 5200 -S 9:00 -s 19:30

# Clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Terminal mux server
exec-once = wezterm-mux-server --daemonize --cwd ~/

# Idle management
exec-once = hypridle
