windowrulev2 = float, class:(Zoom Workplace)
windowrulev2 = tile, title:^(Meeting)$, class:(Zoom Workplace)
windowrulev2 = float, title:^(Setting)$, class:(Zoom Workplace)
windowrulev2 = float, initialTitle:(.*bottombar.*)
windowrulev2 = maxsize 300 200, initialTitle:(.*bottombar.*)
windowrulev2 = move cursor 0% -100%, initialTitle:(.*bottombar.*)
windowrulev2 = stayfocused, initialTitle:(.*bottombar.*)
