# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for more
# ######## Workspace rules ########
workspace = name:web, on-created-empty:brave, monitor:DP-1
workspace = name:coding, on-created-empty:wezterm, monitor:DP-1

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# ######## Window rules ########
windowrule = noblur,.*

windowrule = float, class:^(blueberry.py)$
windowrule = float, class:^(steam)$
windowrule = float, class:^(guifetch)$ # FlafyDev/guifetch
windowrule = tile, class:(wps)
windowrule = tile, class:(dev.warp.Warp)

# Picture-in-Picture
windowrule = float, title:^(Picture-in-Picture)$
windowrule = size 960 540, title:^(Picture-in-Picture)$
windowrule = move 25%-, title:^(Picture-in-Picture)$

# Media viewers
windowrule = float, class:^(imv)$
windowrule = move 25%-, class:^(imv)$
windowrule = size 960 540, class:^(imv)$
windowrule = float, class:^(mpv)$
windowrule = move 25%-, class:^(mpv)$
windowrule = size 960 540, class:^(mpv)$
windowrule = idleinhibit focus, class:^(mpv)$
windowrule = idleinhibit fullscreen, class:^(firefox)$
windowrule = noblur, class:^(firefox)$

# Floating terminals
windowrule = float, class:^(danmufloat)$
windowrule = move 25%-, class:^(danmufloat)$
windowrule = pin, class:^(danmufloat)$
windowrule = rounding 5, class:^(danmufloat)$
windowrule = size 960 540, class:^(danmufloat)$
windowrule = float, class:^(termfloat)$
windowrule = move 25%-, class:^(termfloat)$
windowrule = size 960 540, class:^(termfloat)$
windowrule = rounding 5, class:^(termfloat)$

# File managers
windowrule = float, class:^(nemo)$
windowrule = move 25%-, class:^(nemo)$
windowrule = size 960 540, class:^(nemo)$

# Music
windowrule = float, class:^(ncmpcpp)$
windowrule = move 25%-, class:^(ncmpcpp)$
windowrule = size 960 540, class:^(ncmpcpp)$
windowrule = opacity 0.95, title:NetEase Cloud Music Gtk4
windowrule = workspace name:Music, title:NetEase Cloud Music Gtk4
windowrule = workspace name:Music, class:^(musicfox)$

# Chat
windowrule = opacity 0.95, title:Telegram
windowrule = opacity 0.95, title:QQ
windowrule = workspace name:QQ, title:Icalingua++
windowrule = workspace name:TG, title:Telegram

# Animation overrides
windowrule = animation slide right, class:^(kitty)$

# Dialogs
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Select a File)(.*)$
windowrule = float, title:^(Choose wallpaper)(.*)$
windowrule = float, title:^(Open Folder)(.*)$
windowrule = float, title:^(Save As)(.*)$
windowrule = float, title:^(Library)(.*)$
windowrule = float, title:^(Media viewer)$
windowrule = float, title:^(Bitwarden)$
windowrule = float, title:^(Confirm to replace files)
windowrule = float, title:^(File Operation Progress)

# ######## Layer rules ########
layerrule = xray 1, .*
layerrule = noanim, walker
layerrule = noanim, selection
layerrule = noanim, overview
layerrule = noanim, anyrun
layerrule = noanim, indicator.*
layerrule = noanim, osk
layerrule = noanim, hyprpicker
layerrule = blur, shell:*
layerrule = ignorealpha 0.6, shell:*

layerrule = noanim, noanim
layerrule = blur, gtk-layer-shell
layerrule = ignorezero, gtk-layer-shell
layerrule = blur, launcher
layerrule = ignorealpha 0.5, launcher
layerrule = blur, notifications
layerrule = ignorealpha 0.69, notifications

# ags
layerrule = blur, session

layerrule = blur, bar
layerrule = ignorealpha 0.6, bar
layerrule = blur, corner.*
layerrule = ignorealpha 0.6, corner.*
layerrule = blur, dock
layerrule = ignorealpha 0.6, dock
layerrule = blur, indicator.*
layerrule = ignorealpha 0.6, indicator.*
layerrule = blur, overview
layerrule = ignorealpha 0.6, overview
layerrule = blur, cheatsheet
layerrule = ignorealpha 0.6, cheatsheet
layerrule = blur, sideright
layerrule = ignorealpha 0.6, sideright
layerrule = blur, sideleft
layerrule = ignorealpha 0.6, sideleft
layerrule = blur, indicator*
layerrule = ignorealpha 0.6, indicator*
layerrule = blur, osk
layerrule = ignorealpha 0.6, osk

# General window rules
windowrule = float, class:^(file_progress)$
windowrule = float, class:^(confirm)$
windowrule = float, class:^(dialog)$
windowrule = float, class:^(download)$
windowrule = float, class:^(notification)$
windowrule = float, class:^(error)$
windowrule = float, class:^(splash)$
windowrule = float, class:^(confirmreset)$
windowrule = float, title:Open File
windowrule = float, title:branchdialog
windowrule = float, class:^(Lxappearance)$
windowrule = float, class:^(Rofi)$
windowrule = animation none, class:^(Rofi)$
windowrule = stayfocused, class:^(rofi)$
windowrule = float, class:^(viewnior)$
windowrule = float, class:^(Viewnior)$
windowrule = float, class:^(feh)$
windowrule = float, class:^(pavucontrol-qt)$
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(file-roller)$
windowrule = fullscreen, class:^(wlogout)$
windowrule = float, title:wlogout
windowrule = fullscreen, title:wlogout
windowrule = float, title:^(Volume Control)$
windowrule = size 800 600, title:^(Volume Control)$
windowrule = move 75 44%, title:^(Volume Control)$
windowrule = float, title:^(DevTools)$
windowrule = move 0 0, title:^(flameshot)

# Brave / Thunderbird
windowrule = tile, initialTitle:Mozilla Thunderbird
windowrule = tile, initialClass:^(brave-browser)$
windowrule = move 100%-w-20 100, initialClass:^(brave-browser)$
windowrule = tile, title:^(.*- Brave)$

# Notification rules
windowrule = float, initialClass:thunderbird
windowrule = move 100%-w-20 100, initialClass:thunderbird

# Thunderbird compose
windowrule = float, initialTitle:^(Write)
windowrule = move 25% 50, initialTitle:^(Write)
windowrule = size 50% 95%, initialTitle:^(Write)
windowrule = opaque, initialTitle:^(Write)
windowrule = opaque, title:Create or import a stash

# Polkit
windowrule = float, class:^(org.kde.polkit-kde-authentication-agent-1)$

# Zoom
windowrule = opaque, initialTitle:^(Choose one of the audio conference options)$
windowrule = opaque, title:^(Zoom Meeting)$
windowrule = float, class:^(Zoom Meeting)$
windowrule = opaque, title:^(Meeting)$
windowrule = float, title:^(menu window)$
windowrule = opaque, class:^(zoom)$
windowrule = float, class:^(zoom)$
windowrule = move 3 53, class:^(zoom)$, title:as_toolbar
windowrule = float, class:(Zoom Workplace)
windowrule = tile, title:^(Meeting)$, class:(Zoom Workplace)
windowrule = float, title:^(Setting)$, class:(Zoom Workplace)
windowrule = float, initialTitle:(.*bottombar.*)
windowrule = maxsize 300 200, initialTitle:(.*bottombar.*)
windowrule = move cursor 0% -100%, initialTitle:(.*bottombar.*)
windowrule = stayfocused, initialTitle:(.*bottombar.*)
windowrule = float, title:^(.*)menu(.*), class:(Zoom Workplace)
windowrule = move cursor 0% -100%, title:^(.*)menu(.*), class:(Zoom Workplace)
windowrule = stayfocused, title:(.*menu.*), class:(Zoom Workplace)
windowrule = minsize 400 100, title:(.*menu.*), class:(Zoom Workplace)
windowrule = tile, class:^(zoom)$
windowrule = tile, class:^(Zoom)(.*)$

# Opacity overrides
windowrule = opacity 0.85 override 0.85 override, class:^(thunar)$
windowrule = opacity 0.85 override 0.85 override, class:^(gedit)$
windowrule = opacity 0.85 override 0.85 override, class:^(catfish)$

# App-specific rules
windowrule = tile, class:^(org.wezfurlong.wezterm)$
windowrule = float, class:^(kitty)$
windowrule = float, class:^(qgis)$
windowrule = float, class:^(Legend)$

# Garuda tools
windowrule = float, class:^(garuda-assistant)$
windowrule = float, class:^(garuda-boot-options)$
windowrule = float, class:^(garuda-boot-repair)$
windowrule = float, class:^(garuda-gamer)$
windowrule = float, class:^(garuda-network-assistant)$
windowrule = float, class:^(garuda-settings-manager)$
windowrule = float, class:^(garuda-welcome)$
