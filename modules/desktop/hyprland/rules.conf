windowrule = float, class:^(Zoom Meeting)$
windowrule = opaque, title:^(Meeting)$
windowrule = float, title:^(menu window)$
windowrule = opaque, class:^(zoom)$
windowrule = float, class:^(zoom)$
# windowrule = opaque, class:^(hyprland-share-picker)$
