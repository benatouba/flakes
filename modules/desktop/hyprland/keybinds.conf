$mainMod = Alt_L
$browser = brave
$terminal = wezterm connect unix
$editor = nvim
$explorer = yazi
$scriptsDir = $HOME/projects/flakes/modules/desktop/hyprland/scripts

# App launchers
bind = , SUPER_L, exec, pkill rofi || rofi -show combi
bind = $mainMod SHIFT, Return, exec, $terminal

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, Space, togglefloating,
bind = $mainMod, F, fullscreen
bind = $mainMod, Y, pin
bind = $mainMod, p, pseudo,
bind = $mainMod, t, togglesplit,

# Groups
bind = $mainMod, K, togglegroup,
bind = $mainMod, Tab, changegroupactive, f
bind = $mainMod CTRL, Space, togglegroup
bind = $mainMod, n, changegroupactive, f
bind = $mainMod, p, changegroupactive, b

# Gaps
bind = $mainMod SHIFT, G, exec, hyprctl --batch "keyword general:gaps_out 5;keyword general:gaps_in 3"
bind = $mainMod, G, exec, hyprctl --batch "keyword general:gaps_out 0;keyword general:gaps_in 0"

# Keyboard layout
bind = $mainMod, SPACE, exec, hyprctl switchxkblayout cherry-usb-keyboard next

# Reload
bind = $mainMod SHIFT, R, exec, hyprctl reload && bash $scriptsDir/refresh.sh

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, H, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, L, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, K, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, K, movewindoworgroup, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, J, movewindoworgroup, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, H, movewindoworgroup, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, L, movewindoworgroup, r
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize (inline)
bind = CTRL SHIFT, left, resizeactive, -15 0
bind = CTRL SHIFT, right, resizeactive, 15 0
bind = CTRL SHIFT, up, resizeactive, 0 -15
bind = CTRL SHIFT, down, resizeactive, 0 15
bind = CTRL SHIFT, l, resizeactive, 15 0
bind = CTRL SHIFT, h, resizeactive, -15 0
bind = CTRL SHIFT, k, resizeactive, 0 -15
bind = CTRL SHIFT, j, resizeactive, 0 15

# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive, 10 0
binde = , L, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , H, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , K, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
binde = , J, resizeactive, 0 10
bind = , escape, submap, reset
bind = $mainMod, R, submap, reset
submap = reset

# Switch workspaces
bind = $mainMod, L, workspace, +1
bind = $mainMod, H, workspace, -1
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, slash, workspace, previous
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, W, workspace, name:web
bind = $mainMod, e, workspace, name:email
bind = $mainMod, m, workspace, name:music
bind = $mainMod, Return, workspace, name:terminal
bind = $mainMod, C, togglespecialworkspace
bind = $mainMod SHIFT, C, movetoworkspace, special

binds {
  workspace_back_and_forth = 1
  allow_workspace_cycles = 1
}

# Move to workspace (follow focus)
bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10
bind = ALT SHIFT, w, movetoworkspace, name:web
bind = ALT SHIFT, e, movetoworkspace, name:email
bind = ALT SHIFT, m, movetoworkspace, name:music
bind = ALT SHIFT, Return, movetoworkspace, name:terminal

# Move to workspace (silent)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod SHIFT, w, movetoworkspacesilent, name:web
bind = $mainMod SHIFT, e, movetoworkspacesilent, name:email
bind = $mainMod SHIFT, m, movetoworkspacesilent, name:music
bind = $mainMod SHIFT, Return, movetoworkspacesilent, name:terminal

# Move workspace to monitor
bind = $mainMod CTRL_L, 1, movecurrentworkspacetomonitor, 0
bind = $mainMod CTRL_L, 2, movecurrentworkspacetomonitor, 1
bind = $mainMod CTRL_L, 3, movecurrentworkspacetomonitor, 2

# Audio
bind = , 122, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , 123, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , 121, exec, pactl set-sink-volume @DEFAULT_SINK@ 0%

# Brightness
bind = , 232, exec, light -U 5
bind = , 233, exec, light -A 5

# Media
bind = , 172, exec, playerctl play-pause
bind = , 171, exec, playerctl next
bind = , 173, exec, playerctl previous

# Screenshots
bind = , Print, exec, hyprshot -m region --clipboard-only
bind = CTRL, Print, exec, hyprshot -m active
bind = SHIFT, Print, exec, hyprshot -m display

# Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, B, exec, rofi-rbw -a copy --no-help --clear-after 20
bind = $mainMod, B, exec, rofi-rbw --no-help --clear-after 20 --selector-args="-theme-str 'window { width: 800px;}'"
