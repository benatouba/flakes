# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
device {
  name = cherry-usb-keyboard
  kb_layout = us
  kb_variant = intl,
  kb_options = caps:swapescape, compose:menu
}
input {
  kb_layout = de
	kb_variant =
	kb_model =
	kb_options = caps:swapescape
	kb_rules =
	numlock_by_default= true
	follow_mouse = 2
	repeat_delay = 200
	repeat_rate = 40

	touchpad {
			natural_scroll = true
			tap-to-click = true
			disable_while_typing = true
	}
	sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more
  border_size = 1
  col.active_border = $flamingo $rosewater 45deg
  col.inactive_border = rgba(595959aa)
  col.nogroup_border = $surface0 $surface1 45deg
  col.nogroup_border_active = $green $yellow 45deg
  gaps_in = 2
  gaps_out = 3
  layout = dwindle # default layout
  resize_on_border = true
}

decoration {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more
  rounding = 4
  blur {
   enabled = true
   size = 5
   passes = 1
  }
	active_opacity = 1.0
	inactive_opacity = 1.0
	fullscreen_opacity = 1.0

	dim_inactive = false
}

animations {
	enabled = true

	# Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

	# Mine
	# bezier = myBezier, 0.05, 0.9, 0.1, 1.05
	#
	# animation = windows, 1, 3, myBezier
	# animation = windowsOut, 1, 3, default, popin 80%
	# animation = border, 1, 6, default
	# animation = fade, 1, 3, default
	# animation = workspaces, 1, 2, default

	# Ruixi
	bezier = overshot, 0.13, 0.99, 0.29, 1.1
	animation = windows, 1, 4, overshot, slide
	animation = windowsOut, 1, 5, default, popin 80%
	animation = border, 1, 5, default
	animation = fade, 1, 8, default
	animation = workspaces, 1, 6, overshot, slidevert
}

group {
  insert_after_current = true
  focus_removed_window = true
  col.border_active = $rosewater
  col.border_inactive = $subtext0
  col.border_locked_active = $rosewater
  col.border_locked_inactive = $subtext0
  # groupbar = {
  #   enabled = true
  #   text_color = $subtext0
  # }
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
    new_on_top = true
    new_on_active = before
    # special_scale_factor = 0.8
    mfact = 0.8
}

gestures {
	# See https://wiki.hyprland.org/Configuring/Variables/ for more
	workspace_swipe = on
	workspace_swipe_fingers = 4
	workspace_swipe_distance = 250
	workspace_swipe_invert = true
	workspace_swipe_min_speed_to_force = 15
	workspace_swipe_cancel_ratio = 0.5
	workspace_swipe_create_new = false
}
# ecosystem {
#   no_donation_nag = true
# }
#
# experimental {
#   hdr = true
# }
misc {
	disable_autoreload = true
	always_follow_on_dnd = true
	layers_hog_keyboard_focus = true
	animate_manual_resizes = false
	enable_swallow = true
	swallow_regex =
	focus_on_activate = true
  disable_hyprland_logo = true
  # col.splash = $peach
  # col.background_color = $mantle
}
