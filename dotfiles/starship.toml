"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
palette = "@starshipPalette@"

format = """
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$nodejs\
$nix_shell\
$cmd_duration\
$character"""

[character]
success_symbol = "[❯](lavender)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[directory]
style = "bold sapphire"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "green"
symbol = " "
truncation_length = 24

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "peach"
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "* "
modified = "~${count} "
staged = "+${count} "
renamed = "» "
deleted = "✘${count} "

[git_state]
format = '[\($state( $progress_current/$progress_total)\)]($style) '
style = "yellow"

[git_commit]
format = "[$hash$tag]($style) "
tag_symbol = " "
commit_hash_length = 7
style = "overlay2"

[python]
format = '[$symbol$version( \($virtualenv\))]($style) '
symbol = " "
style = "yellow"
python_binary = ['python', 'python3']
detect_extensions = ['py']
detect_files = ['requirements.txt', 'pyproject.toml', 'setup.py', 'Pipfile', '.python-version']

[nodejs]
format = "[$symbol$version]($style) "
symbol = " "
style = "green"
detect_files = ['package.json', '.nvmrc']
detect_extensions = ['js', 'ts', 'vue']

[nix_shell]
format = "[$symbol$state]($style) "
symbol = " "
style = "blue"

[cmd_duration]
format = "[$duration]($style) "
style = "overlay1"
min_time = 2_000

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold blue"

[aws]
disabled = true

[docker_context]
disabled = true

[kubernetes]
disabled = true

